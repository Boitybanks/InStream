[project]
name = "instream-ingestion"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pypdf>=4.0",
    "python-docx>=1.1",
    "instream-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["instream_ingestion"]
